<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SignUp | SmartLearnAI</title>

  <style> 

  </style>


  <!-- Correct Tailwind CSS CDN (Official Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Optional: Add custom config like colors/fonts if needed -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            offwhite: '#f9f9f7',
          }
        }
      }
    }

//Enforce Strong Password

const strongPasswordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{10,}$/;
if (!strongPasswordRegex.test(password)) {
  alert("Password must be at least 10 characters and include uppercase, lowercase, number, and special character.");
  return;
}

//Confirm Password

const confirmPassword = document.querySelector('input[placeholder="Confirm Password"]').value;
if (password !== confirmPassword) {
    alert("Passwords do not match.");
    return;
}

//Sign Up UserAuth

document.getElementById('signupEmail').addEventListener('blur', async () => {
    const email = document.getElementById('signupEmail').value.trim();
    if (!email) return;

    const res = await fetch('/check_email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
    });

    const result = await res.json();

    if (result.exists) {
        document.getElementById('emailError').innerText = "Email already exists!";
    } else {
        document.getElementById('emailError').innerText = "";
    }
});

document.getElementById('signupBtn').addEventListener('click', async (e) => {
    e.preventDefault();

    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    if (!email || !password) {
        alert("Please enter email and password.");
        return;
    }

    const response = await fetch('/signup_user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

    const result = await response.json();
    alert(result.message);

    if (result.success) {
        // Optionally redirect to login
        window.location.href = '/login';
    }
});

  </script>
</head>

<body class="flex h-screen w-screen font-sans">

  <!-- Left Section (Dark Theme) -->
<div id="leftContainer" class="w-[65%] bg-gray-900 text-white p-[5%] px-[4%]">
  <h2 class="text-3xl font-bold justify-start">Infera</h2>

  <div class="mt-12 pt-[5%]">
    <div class="w-full h-64 flex">
      <div class="w-full text-center lg:text-left">
        <h1 class="text-4xl sm:text-5xl font-extrabold leading-tight mb-3">Personalized.</h1>
	<h1 class="text-4xl sm:text-5xl font-extrabold leading-tight mb-3">Gamified.</h1>
        <h1 class="text-4xl sm:text-5xl font-extrabold leading-tight mb-3">AI-Powered Analyst.</h1>
        <p class="text-lg mb-6">Tell us what you want to learn — let AI design a curriculum tailored to your strengths.</p>
      </div>
    </div>
  </div>
</div>

  <!-- Right Section (Light Theme) -->
  <div class="w-[35%] bg-[#f9f9f7] flex items-center justify-center">
    <div class="w-full px-[12%] py-[15%] space-y-1">

      <!-- Title -->
      <h2 class="text-3xl font-bold text-gray-800 pb-8 -mt-8" >SignUp to SmartLearnAI</h2>
            
      <!-- Social Login Buttons -->
      <button class="w-[90%] bg-white border border-gray-300 rounded-full py-2 text-md font-semibold text-gray-700 hover:bg-gray-100 flex items-center justify-center gap-2" style="margin-bottom: 20px;">
        <img src="{{ url_for('static', filename='img/Google.png') }}" alt="GoogleLogo" width="20" height="20" class="inline-block">
        Sign Up with Google
      </button>
      <button class="w-[90%] bg-white border border-gray-300 rounded-full py-2 text-md font-semibold text-gray-700 hover:bg-gray-100 flex items-center justify-center gap-2" style="margin-bottom: 20px;">
        <img src="{{ url_for('static', filename='img/Discord.png') }}" alt="DiscordLogo" width="25" height="25" class="inline-block">
        Sign Up with Discord
      </button>

      <!-- Divider with OR -->
      <div class="w-[90%] relative flex items-center justify-center">
        <hr class="w-full border-gray-300"/>
        <span class="absolute bg-[#f9f9f7] px-2 text-sm text-gray-500" >or</span>
      </div>

      <!-- Email and Password Fields -->
    <form method="POST" action="/signup_user">
      <input type="email" id="signupEmail" name="email" required placeholder="email@example.com" class="w-[90%] p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-400" style="margin-bottom: 20px;margin-top: 20px;"/>
      <span id="emailError" style="color: red;"></span>
      <input type="password" id="signupPassword" name="password" required placeholder="Password (atleast 10 Characters)" class="w-[90%] p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-400" style="margin-bottom: 20px;"/>
      <input type="password" placeholder="Confirm Password" class="w-[90%] p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-400" style="margin-bottom: 15px;"/>

      <!-- Agreement -->
      <div class="flex justify-start">
        <p class="text-md text-gray-500" style="margin-bottom: 10px;">I, hereby, agree to
        <br>
        <a href="#" class="text-sm text-gray-500 hover:text-indigo-500 hover:underline" mt="3px" style="margin-bottom: 10px;">Terms & Conditions | </a>
        <a href="#" class="text-sm text-gray-500 hover:text-indigo-500 hover:underline" mt="3px" style="margin-bottom: 10px;"> Copyrights</a>
        </p>
      </div>

      <!-- CTA Login Button -->
      <button type="submit" id="signupBtn" class="w-[90%] bg-indigo-600 text-white text-xl font-bold py-2 rounded-full hover:bg-indigo-700 transition" style="margin-top: 25px;">
        Sign Up
      </button>
    </form>

      <!-- Sign Up Text -->
      <p class="text-md text-gray-600" style="margin-top: 10px;">
        Already have an account? 
        <a href="{{ url_for('login_page') }}" class="text-indigo-600 font-medium hover:underline">Log in</a>
      </p>
    </div>
  </div>

</body>
</html>
